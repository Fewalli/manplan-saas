name: CI-CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: manplan
          POSTGRES_USER: manplan
          POSTGRES_PASSWORD: manplan
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U manplan -d manplan"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps
        working-directory: api
        run: |
          pip install -r requirements.txt

      - name: Alembic upgrade (smoke)
        working-directory: api
        env:
          DATABASE_URL: postgresql+psycopg://manplan:manplan@localhost:5432/manplan
        run: |
          alembic upgrade head

      - name: Build images
        run: |
          docker build -t api:ci ./api
          docker build -t cmms_web:ci ./apps/cmms_web
          docker build -t portal_web:ci ./apps/portal_web

  deploy:
    runs-on: ubuntu-latest
    needs: [test-build]
    if: ${{ secrets.CAPROVER_SERVER != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        run: |
          docker build -t ghcr.io/${{ github.repository }}/api:latest ./api
          docker push ghcr.io/${{ github.repository }}/api:latest

      - name: Build & push CMMS Web
        run: |
          docker build -t ghcr.io/${{ github.repository }}/cmms_web:latest ./apps/cmms_web
          docker push ghcr.io/${{ github.repository }}/cmms_web:latest

      - name: Build & push Portal Web
        run: |
          docker build -t ghcr.io/${{ github.repository }}/portal_web:latest ./apps/portal_web
          docker push ghcr.io/${{ github.repository }}/portal_web:latest

      - name: Install CapRover CLI
        run: npm i -g caprover

      - name: Deploy API
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
          CAPROVER_APP: ${{ secrets.CAPROVER_APP_API }}
        run: |
          caprover login -u captain -p "$CAPROVER_PASSWORD" -h "$CAPROVER_SERVER"
          caprover deploy -h "$CAPROVER_SERVER" -a "$CAPROVER_APP" -i ghcr.io/${{ github.repository }}/api:latest

      - name: Deploy CMMS
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
          CAPROVER_APP: ${{ secrets.CAPROVER_APP_CMMS }}
        run: |
          caprover deploy -h "$CAPROVER_SERVER" -a "$CAPROVER_APP" -i ghcr.io/${{ github.repository }}/cmms_web:latest

      - name: Deploy Portal
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
          CAPROVER_APP: ${{ secrets.CAPROVER_APP_PORTAL }}
        run: |
          caprover deploy -h "$CAPROVER_SERVER" -a "$CAPROVER_APP" -i ghcr.io/${{ github.repository }}/portal_web:latest