services:
  db:
    image: postgres:16
    container_name: manplan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: manplan-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: sh -c "uvicorn manplan_api.main:app --host 0.0.0.0 --port 8000 --reload"

  cmms_web:
    build:
      context: ./apps/cmms_web
      dockerfile: Dockerfile
    container_name: manplan-cmms-web
    restart: unless-stopped
    ports:
      - "${CMMS_WEB_PORT}:80"
    depends_on:
      - api

  portal_web:
    build:
      context: ./apps/portal_web
      dockerfile: Dockerfile
    container_name: manplan-portal-web
    restart: unless-stopped
    ports:
      - "${PORTAL_WEB_PORT}:80"
    depends_on:
      - api

volumes:
  pg_data: